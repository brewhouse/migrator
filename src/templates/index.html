<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrator</title>
    <link rel="stylesheet" href="https://adachecker.planeteria.com/css/app.css">
    <style>
        /* Additional custom styles for branding */
        body { background: #f7f7f7; }
        .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 2rem; }
        h1 { color: #1a2a3a; }
        .form-group { margin-bottom: 1.5rem; }
        label { font-weight: 600; }
        .btn-primary { background: #1a2a3a; color: #fff; border: none; padding: 0.75rem 2rem; border-radius: 4px; }
        .btn-primary:hover { background: #2d3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Website Content Migrator</h1>
        <form method="post" action="/">
            <div class="form-group">
                <label for="source_urls">Source Page URL(s)</label>
                <input type="text" class="form-control" id="source_urls" name="source_urls" placeholder="Enter one or more URLs, comma separated" required>
            </div>
            <div class="form-group">
                <label for="wp_url">Destination WordPress URL</label>
                <input type="url" class="form-control" id="wp_url" name="wp_url" placeholder="https://yourwordpresssite.com" required>
            </div>
            <div class="form-group">
                <label for="wp_user">WordPress Admin/Editor Username</label>
                <input type="text" class="form-control" id="wp_user" name="wp_user" required>
            </div>
            <div class="form-group">
                <label for="wp_pass">WordPress Password</label>
                <input type="password" class="form-control" id="wp_pass" name="wp_pass" required>
            </div>
            <div class="form-group">
                <label for="migrate_type">Migrate as</label>
                <select class="form-control" id="migrate_type" name="migrate_type">
                    <option value="page">Page</option>
                    <option value="post">Post</option>
                </select>
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="featured_image" value="1"> Use hero/banner image as featured image</label>
            </div>
            <div class="form-group">
                <label for="gravity_version">Gravity Forms Version (if forms detected)</label>
                <input type="text" class="form-control" id="gravity_version" name="gravity_version" placeholder="e.g. 2.7" >
            </div>
            <button type="submit" class="btn btn-primary">Migrate</button>
        </form>
    </div>
</body>
</html>
